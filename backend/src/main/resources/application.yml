server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: exam-backend
  datasource:
    # 主库：WAL 模式 + 内存映射 + 缓存优化（数据文件统一放 data/ 目录）
    url: jdbc:sqlite:data/exam.db?journal_mode=WAL&synchronous=NORMAL&cache_size=20000&temp_store=MEMORY&mmap_size=268435456&busy_timeout=10000
    driver-class-name: org.sqlite.JDBC
    username:
    password:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 2
      connection-test-query: SELECT 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: main-pool
  sql:
    init:
      mode: never
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

# 分片数据源基路径（留空则相对工作目录）
shard:
  base-path: "data/"

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.exam.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: exam-system-jwt-secret-key-change-me-in-production-2026
  expire: 86400
  header: Authorization
  prefix: Bearer

knife4j:
  enable: true
  openapi:
    title: 省考试院自学考试计划管理系统 API
    description: 后端接口文档
    version: 1.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.exam.module

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.exam.module

logging:
  level:
    root: INFO
    com.exam: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG
